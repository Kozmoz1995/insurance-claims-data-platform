name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Smoke test local pipeline
        run: |
          python -m claims_platform.pipeline \
            --input data/sample/claims.jsonl \
            --output build/curated.jsonl \
            --quality-report build/quality.json
